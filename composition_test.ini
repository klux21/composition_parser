# alternative  configuration

[server]

host = localhost
port = 8080

tls = {
   enabled
   certificate = "/etc/certs/server.pem"

   [ciphers]

   #*
      comment block
   *#

   accept = {
               TLS_AES_128_CCM_8_SHA256
               TLS_CHACHA20_POLY1305_SHA256
               TLS_AES_128_GCM_SHA256
   }
}

